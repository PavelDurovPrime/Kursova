version: '3.9'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATA_STORAGE=sqlite
      - DATABASE_URL=file:/app/data/gradelogic.db
      - JWT_SECRET=changeme
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
